            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            width: 100%;
            max-width: 500px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }

        select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        select:focus {
            outline: none;
            border-color: #667eea;
        }

        .distance-info {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
        }

        .distance-info p {
            color: #666;
            font-size: 14px;
        }

        .distance-info strong {
            color: #333;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .result {
            margin-top: 30px;
            padding: 25px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 15px;
            text-align: center;
            color: white;
            display: none;
        }

        .result.show {
            display: block;
            animation: fadeIn 0.5s;
        }

        .result h2 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .result p {
            font-size: 18px;
            margin-bottom: 5px;
        }

        .result .time {
            font-size: 32px;
            font-weight: 700;
            margin: 15px 0;
        }

        .result .ov-time {
            font-size: 24px;
            font-weight: 600;
            margin: 10px 0;
            color: rgba(255, 255, 255, 0.9);
        }

        .result .details {
            font-size: 14px;
            opacity: 0.9;
        }

        .error {
            background: #fee;
            border: 2px solid #fcc;
            color: #c33;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
            text-align: center;
        }

        .error.show {
            display: block;
        }

            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        function berekenReistijd() {
            const vertrek = document.getElementById('vertrek').value;
            const bestemming = document.getElementById('bestemming').value;
            const vervoer = document.getElementById('vervoer').value;
            const errorDiv = document.getElementById('error');
            const resultDiv = document.getElementById('result');
            const distanceInfo = document.getElementById('distanceInfo');
            const ovInfo = document.getElementById('ovInfo');
            const ovTijdDisplay = document.getElementById('ovTijdDisplay');

            errorDiv.classList.remove('show');
            resultDiv.classList.remove('show');

            if (!vertrek || !bestemming) {
                errorDiv.textContent = 'Selecteer zowel een vertrekstad als een bestemming!';
                errorDiv.classList.add('show');
                return;
            }

            if (vertrek === bestemming) {
                errorDiv.textContent = 'Vertrekstad en bestemming mogen niet hetzelfde zijn!';
                errorDiv.classList.add('show');
                return;
            }

            // Afstand ophalen
            const afstand = afstanden[vertrek][bestemming];
            
            if (vervoer === 'auto') {
                // Auto reistijd (gemiddelde snelheid 85 km/u op snelweg)
                const snelheid = 85;
                const reisTijdInUur = afstand / snelheid;
                const uren = Math.floor(reisTijdInUur);
                const minuten = Math.round((reisTijdInUur - uren) * 60);

                document.getElementById('afstandText').textContent = `Afstand: <strong>${afstand}</strong> km`;
                document.getElementById('reistijd').textContent = `${uren} uur ${minuten} min`;
                document.getElementById('details').textContent = `Gemiddelde snelheid: ${snelheid} km/u | Afstand: ${afstand} km`;
                
                distanceInfo.style.display = 'block';
                ovInfo.style.display = 'none';
                ovTijdDisplay.style.display = 'none';
            } else {
                // OV reistijd
                const ovTijdMinuten = ovReistijden[vertrek][bestemming];
                const uren = Math.floor(ovTijdMinuten / 60);
                const minuten = ovTijdMinuten % 60;

                document.getElementById('afstandText').textContent = `Afstand: <strong>${afstand}</strong> km`;
                document.getElementById('reistijd').textContent = `${uren} uur ${minuten} min`;
                document.getElementById('details').textContent = `OV verbinding met wissels | Gemiddelde snelheid: ~60 km/u`;
                
                distanceInfo.style.display = 'block';
                ovInfo.style.display = 'none';
                ovTijdDisplay.style.display = 'block';
                document.getElementById('ovTijd').textContent = `${uren} uur ${minuten} min`;
            }

            document.getElementById('vanStad').textContent = stedenNaam[vertrek];
            document.getElementById('naarStad').textContent = stedenNaam[bestemming];
            
            resultDiv.classList.add('show');
        }
    </script>
